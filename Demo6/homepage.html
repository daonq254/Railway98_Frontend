<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Bootstrap</title>
    <!-- bs3-cdn -->
    <!-- Latest compiled and minified CSS & JS -->
    <link rel="stylesheet" media="screen" href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css" />
    <script src="//code.jquery.com/jquery.js"></script>
    <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
  </head>
  <style>
    a_class {
      text-align: center;
      line-height: 30px;
    }
  </style>
  <body>
    <div class="container">
      <!-- menu -->
      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 a_class" style="background-color: aqua; height: 30px">Menu</div>
      </div>

      <!-- banner -->
      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12" style="background-color: beige; height: 200px">Banner</div>
      </div>

      <!-- Main1 -->

      <div class="row">
        <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4" style="background-color: blue; height: 200px">Main1_Left</div>
        <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4" style="background-color: rgb(0, 255, 195); height: 200px">Main1_Center</div>
        <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4" style="background-color: rgb(130, 38, 117); height: 200px">Main1_Right</div>
      </div>
    </div>
  </body>
</html>
